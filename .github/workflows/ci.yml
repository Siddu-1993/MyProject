name: Artifact Demo

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: |
          mkdir output
          echo "Hello Siddu" > output/result.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-files
          path: output/

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: my-files

      - name: Show downloaded files
        run: |
          ls -R
          cat my-files/result.txt
