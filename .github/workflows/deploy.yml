name: Deploy

on:
  workflow_dispatch

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment:
      name: development

    steps:
      - run: echo "Deploying to Development"

  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment:
      name: testing

    steps:
      - run: echo "Deploying to Testing"

  deploy-prod:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - run: echo "Deploying to Production"
